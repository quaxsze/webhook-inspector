name: lint-and-test

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run mypy src

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      # Coverage scoped to domain + application — the layers that SHOULD be
      # unit-tested. Infra + web are integration-tested with testcontainers in
      # the integration job; measuring them here would force a false threshold.
      - run: uv run pytest tests/unit --cov=src/webhook_inspector/domain --cov=src/webhook_inspector/application --cov-report=xml --cov-fail-under=95 -v

  integration:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run pytest tests/integration -v
