name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster it can be fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make up`
        2. Open `http://localhost:8000/...`
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: "main, or specific commit"
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where did you observe the bug?
      options:
        - Local docker-compose
        - Live instance (app.odessa-inspect.org)
        - CI/CD pipeline
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues for this bug
          required: true
        - label: I have read the README and CONTRIBUTING docs
          required: true
