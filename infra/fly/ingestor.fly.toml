app            = "webhook-inspector-ingestor"
primary_region = "cdg"

[build]
  dockerfile = "../../Dockerfile"

[deploy]
  # Pas de release_command : seul le service web pilote les migrations.
  strategy = "rolling"

[processes]
  app = "uvicorn webhook_inspector.web.ingestor.main:app --host 0.0.0.0 --port 8080"

[env]
  PORT                     = "8080"
  ENVIRONMENT              = "prod"
  LOG_LEVEL                = "INFO"
  SERVICE_NAME             = "webhook-inspector"
  BLOB_STORAGE_BACKEND     = "s3"
  S3_REGION                = "auto"
  CLOUD_TRACE_ENABLED      = "false"
  CLOUD_METRICS_ENABLED    = "false"
  OTEL_TRACES_SAMPLER      = "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG  = "0.05"
  TRACE_SAMPLE_RATIO       = "0.05"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 400

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "2s"
    grace_period = "10s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
