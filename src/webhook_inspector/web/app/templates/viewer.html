<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webhook Inspector — {{ token }}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <header class="border-b border-slate-700 px-6 py-4 flex items-start justify-between gap-4">
    <div>
      <h1 class="text-xl font-mono">webhook-inspector</h1>
      <p class="text-sm text-slate-400 mt-1">
        URL d'ingestion :
        <code class="bg-slate-800 px-2 py-1 rounded">{{ hook_url }}</code>
      </p>
    </div>
    <a class="export-button shrink-0 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-mono px-3 py-2 rounded"
       href="/api/endpoints/{{ token }}/export.json"
       download>
      Export JSON
    </a>
  </header>

  <main class="px-6 py-4">
    <form class="mb-3"
          hx-get="/api/endpoints/{{ token }}/requests.fragment"
          hx-target="#requests"
          hx-trigger="keyup changed delay:300ms from:input[name='q'], search from:input[name='q']"
          hx-swap="innerHTML"
          onsubmit="event.preventDefault()">
      <input type="search"
             name="q"
             placeholder="Search captured requests..."
             aria-label="Search captured requests"
             maxlength="200"
             class="w-full bg-slate-800 border border-slate-700 text-slate-100 rounded px-3 py-2 text-sm font-mono placeholder-slate-500 focus:outline-none focus:border-emerald-400">
    </form>
    <div hx-ext="sse" sse-connect="/stream/{{ token }}" class="space-y-2">
      <ul id="requests" sse-swap="message" hx-swap="afterbegin" class="space-y-2">
        {% for req in initial_requests %}
          {% include "request_fragment.html" %}
        {% endfor %}
      </ul>
    </div>
  </main>

  <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-slate-100 px-3 py-2 rounded shadow-lg opacity-0 transition-opacity pointer-events-none">
    Copied to clipboard
  </div>

  <script>
    function showToast() {
      const t = document.getElementById("toast");
      t.style.opacity = "1";
      setTimeout(() => { t.style.opacity = "0"; }, 2000);
    }

    function buildCurl(li) {
      const method = li.dataset.method;
      const url = li.dataset.url;
      const headers = JSON.parse(li.dataset.headers || "{}");
      const body = JSON.parse(li.dataset.body);
      const bodySize = parseInt(li.dataset.bodySize, 10);

      const lines = [`curl -X ${method} '${url.replace(/'/g, "'\\''")}'`];
      for (const [k, v] of Object.entries(headers)) {
        // Skip headers curl will set automatically
        if (["host", "content-length"].includes(k.toLowerCase())) continue;
        lines.push(`  -H '${k}: ${String(v).replace(/'/g, "'\\''")}'`);
      }
      if (body !== null && body !== "") {
        lines.push(`  -d '${body.replace(/'/g, "'\\''")}'`);
      } else if (bodySize > 8192) {
        lines.push(`  # body too large, not inline (size: ${bodySize} bytes)`);
      }
      return lines.join(" \\\n");
    }

    document.getElementById("requests").addEventListener("click", async (e) => {
      const btn = e.target.closest(".copy-curl-btn");
      if (!btn) return;
      const li = btn.closest("li");
      if (!li) return;
      const cmd = buildCurl(li);
      try {
        await navigator.clipboard.writeText(cmd);
        showToast();
      } catch {
        // Fallback for older browsers
        const ta = document.createElement("textarea");
        ta.value = cmd;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showToast();
      }
    });
  </script>
</body>
</html>
